<!DOCTYPE html>
<html>
<head>
  <title>PeakFit Voice Booking</title>
</head>
<body>

<h1>PeakFit Fitness Studio</h1>

<p>Click below to start voice booking.</p>

<script>
  var vapiInstance = null;

  const assistant = "13f7f1b3-3448-4fec-a348-4721c5141a25";

  const apiKey = "d9af73e7-201a-4f16-85d6-f32049981526";

  const buttonConfig = {
    position: "bottom-right",
    title: "Start Voice Booking"
  };

  (function (d, t) {
    var g = document.createElement(t),
      s = d.getElementsByTagName(t)[0];

    g.src =
      "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";

    g.defer = true;
    g.async = true;

    s.parentNode.insertBefore(g, s);

    g.onload = function () {
      vapiInstance = window.vapiSDK.run({
        apiKey: apiKey,
        assistant: assistant,
        config: buttonConfig,
      });
    };
  })(document, "script");
</script>

</body>
</html>
