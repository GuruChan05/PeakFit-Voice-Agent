<!DOCTYPE html><html>
<head>
  <title>PeakFit Voice Agent</title>
</head>
<body><h1>PeakFit Voice Agent</h1><button id="start">Start Call</button>

<script type="module">
import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/index.js";

const vapi = new Vapi("d9af73e7-201a-4f16-85d6-f32049981526");

document.getElementById("start").addEventListener("click", async () => {
  await vapi.start("13f7f1b3-3448-4fec-a348-4721c5141a25");
});

vapi.on("call-start", () => {
  console.log("Call Started");
});

vapi.on("call-end", () => {
  console.log("Call Ended");
});
</script></body>
</html>
